<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İklim Değişikliği - Seher Şeker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tam Ekran Modu İçin Konteyner Ayarı */
        .presentation-container:-webkit-full-screen { width: 100%; height: 100%; border-radius: 0; }
        .presentation-container:fullscreen { width: 100%; height: 100%; border-radius: 0; }

        .presentation-container {
            width: 1000px;
            background: #fff;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .slide-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            position: relative;
        }

        .slide-image {
            max-width: 100%;
            max-height: 100%;
            display: none;
            animation: fadeIn 0.6s ease;
        }

        .slide-image.active {
            display: block;
        }

        /* Overlay Butonları (Sadece 15. Sayfada) */
        .overlay-controls {
            position: absolute;
            display: none;
            gap: 20px;
            z-index: 10;
            bottom: 25px;
            width: 100%;
            justify-content: center;
        }

        .special-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            text-transform: uppercase;
        }

        .special-btn:hover { transform: translateY(-2px); background: #d35400; }
        .home-btn { background: #2c3e50; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Alt Navigasyon */
        .navigation {
            background: #fdfaf5; 
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0dbd1;
        }

        .nav-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-count { font-weight: bold; color: #5d5d5d; }

        /* Tam Ekran İkonu */
        .fullscreen-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .fullscreen-btn:hover { transform: scale(1.2); }
        .fullscreen-btn svg { fill: #2c3e50; width: 24px; height: 24px; }
    </style>
</head>
<body>

<div class="presentation-container" id="main-container">
    <div class="slide-area">
        <img src="seher1.jpg" class="slide-image active">
        <img src="seher2.jpg" class="slide-image">
        <img src="seher3.jpg" class="slide-image">
        <img src="seher4.jpg" class="slide-image">
        <img src="seher5.jpg" class="slide-image">
        <img src="seher6.jpg" class="slide-image">
        <img src="seher7.jpg" class="slide-image">
        <img src="seher8.jpg" class="slide-image">
        <img src="seher9.jpg" class="slide-image">
        <img src="seher10.jpg" class="slide-image">
        <img src="seher11.jpg" class="slide-image">
        <img src="seher12.jpg" class="slide-image">
        <img src="seher13.jpg" class="slide-image">
        <img src="seher14.jpg" class="slide-image">
        <img src="seher15.jpg" class="slide-image">

        <div id="end-overlay" class="overlay-controls">
            <a href="index.html" class="special-btn home-btn">ANA SAYFAYA DÖN</a>
            <button class="special-btn" onclick="goToStart()">YENİDEN BAŞLAT</button>
        </div>
    </div>

    <div class="navigation">
        <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>GERİ</button>
        
        <div class="right-controls">
            <div class="page-count" id="pageIndicator">SAYFA 1 / 15</div>
            
            <button class="fullscreen-btn" onclick="toggleFullScreen()" title="Tam Ekran">
                <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
        </div>

        <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">İLERİ</button>
    </div>
</div>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide-image');
    const totalSlides = slides.length;
    const pageIndicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const endOverlay = document.getElementById('end-overlay');
    const container = document.getElementById('main-container');

    function changeSlide(direction) {
        slides[currentSlide].classList.remove('active');
        currentSlide += direction;
        if (currentSlide < 0) currentSlide = 0;
        if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
        slides[currentSlide].classList.add('active');
        updateUI();
    }

    function goToStart() {
        slides[currentSlide].classList.remove('active');
        currentSlide = 0;
        slides[currentSlide].classList.add('active');
        updateUI();
    }

    function updateUI() {
        pageIndicator.innerText = `SAYFA ${currentSlide + 1} / ${totalSlides}`;
        prevBtn.disabled = (currentSlide === 0);
        nextBtn.disabled = (currentSlide === totalSlides - 1);
        endOverlay.style.display = (currentSlide === totalSlides - 1) ? 'flex' : 'none';
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => {
                alert(`Hata: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }
</script>

</body>
</html>
