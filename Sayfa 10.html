<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teşekkürler - Sayfa 10</title>
    <style>
        /* Logo Stili */
        .logo-container {
            position: absolute;
            top: 30px;
            left: 10%;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .logo-s { color: #2c3e50; } /* Sayfa beyaz olduğu için koyu gri/lacivert yaptım */
        .logo-sh { color: #007AFF; }

        /* MOBİL AYARLARI */
        @media (max-width: 768px) {
            .logo-container { left: 50%; transform: translateX(-50%); top: 20px; }
            .ana-icerik {
                flex-direction: column !important;
                padding: 100px 20px 40px !important; /* Logo için üstten pay bıraktım */
                height: auto !important;
                text-align: center;
            }
            .metin-alani, .resim-alani {
                width: 100% !important;
                padding: 0 !important;
            }
            .resim-alani { margin-top: 30px; }
            h2 { font-size: 2.2em !important; }
            .alt-nav { height: auto !important; padding: 25px 0 !important; }
            .buton-grubu {
                flex-direction: column !important;
                gap: 15px !important;
                width: 90%;
            }
            .nav-btn { width: 100% !important; text-align: center; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;">

    <div class="logo-container">
        <span class="logo-s">SERDAR</span><span class="logo-sh">ŞEKER</span>
    </div>

    <div style="display: flex; flex-direction: column; min-height: 100vh;">
        
        <div class="ana-icerik" style="flex: 1; display: flex; align-items: center; padding: 0 10%; gap: 50px;">
            
            <div class="metin-alani" style="flex: 1.2;">
                <div style="width: 50px; height: 5px; background: #e74c3c; margin-bottom: 20px;"></div>
                <h2 style="color: #2c3e50; font-size: 3.5em; margin: 0; line-height: 1.1;">Dinlediğiniz İçin Teşekkürler!</h2>
                <p style="color: #34495e; font-size: 1.6em; line-height: 1.5; margin-top: 30px; font-style: italic;">
                    "Dünya bize atalarımızdan miras kalmadı, biz onu çocuklarımızdan ödünç aldık."
                </p>
                
                <div style="margin-top: 40px; padding: 30px; background: #f8f9fa; border-radius: 20px; border: 1px solid #eee;">
                    <p style="color: #2c3e50; font-size: 1.2em; margin: 0;"><strong>Safiye ŞEKER</strong></p>
                    <p style="color: #7f8c8d; font-size: 1.1em; margin: 5px 0 0 0;">9/C Sınıfı - No: 236</p>
                </div>
            </div>

            <div class="resim-alani" style="flex: 1;">
                <img src="sayfa13.jpeg" style="width: 100%; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.15);" alt="Kapanış Görseli">
            </div>
        </div>

        <div class="alt-nav" style="height: 120px; display: flex; align-items: center; justify-content: center; background: #2c3e50; border-top: 1px solid #1a252f;">
            
            <div class="buton-grubu" style="display: flex; gap: 20px; align-items: center;">
                <a href="sunum.html" class="nav-btn" style="text-decoration: none; background: #3498db; color: white; padding: 15px 35px; border-radius: 50px; font-weight: bold; font-size: 1.1em; transition: 0.3s; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);">
                    🔄 SUNUMU BAŞLAT
                </a>

                <a href="index.html" class="nav-btn" style="text-decoration: none; background: #2ecc71; color: white; padding: 15px 35px; border-radius: 50px; font-weight: bold; font-size: 1.1em; transition: 0.3s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);">
                    🏠 ANA SİTEYE DÖN
                </a>
            </div>

        </div>
    </div>

</body>
</html>
